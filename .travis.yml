language: node_js
node_js:
  - "20"

cache: npm

branches:
  only:
    - master

before_script:
  - npm install -g firebase-tools

install:
  - npm ci

script:
  - npm run lint
  - npm run typecheck
  - npm test
  - npm run build

after_success:
  - firebase use default
  - firebase deploy --token $FIREBASE_TOKEN

notifications:
  email:
    on_failure: change
    on_success: change
