language: node_js
node_js:
  - "20"

branches:
  only:
    - master

cache:
  directories:
    - react-app/node_modules

before_script:
  - npm install -g firebase-tools

install:
  - cd react-app && npm install && cd ..

script:
  - cd react-app && npm run build && npm test && cd ..

after_success:
  - firebase use default
  - firebase deploy --token $FIREBASE_TOKEN

notifications:
  email:
    on_failure: change
    on_success: change
