language: node_js
node_js:
  - "20"

branches:
  only:
    - master

cache:
  npm: true
  directories:
    - react-app/node_modules

install:
  - cd react-app && npm install

script:
  - cd react-app && npm run lint
  - cd react-app && npm test
  - cd react-app && npm run build

notifications:
  email:
    on_failure: change
    on_success: change
