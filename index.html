<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#b92b27" />
    <meta name="Description" content="Hacker News PWA built with React">
    <title>Angular 2 HN</title>
  </head>
  <body>
    <div id="root"></div>
    <div class="app-loader">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
        <g fill="none" stroke="#b92b27" stroke-width="4">
          <circle cx="50" cy="50" r="40" opacity="0.3"/>
          <circle cx="50" cy="50" r="40" stroke-dasharray="160" stroke-dashoffset="80">
            <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="1s" repeatCount="indefinite"/>
          </circle>
        </g>
      </svg>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
